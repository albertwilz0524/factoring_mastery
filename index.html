<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factoring Mastery 🧮</title>
    <style>
        /* CSS VARIABLES & RESET */
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --bg-input: #eef2f3;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #6c5ce7; 
            --primary-hover: #5b4bc4;
            --success: #00b894; 
            --warning: #fdcb6e; 
            --error: #ff7675;   
            --super: #fd79a8;   
            --border: #dfe6e9;
            --radius: 16px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.2s ease;
        }[data-theme="dark"] {
            --bg-body: #1e272e;
            --bg-card: #2f3640;
            --bg-input: #353b48;
            --text-main: #f5f6fa;
            --text-muted: #7f8fa6;
            --border: #40739e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-family); background-color: var(--bg-body); color: var(--text-main);
            min-height: 100dvh; display: flex; flex-direction: column; transition: background-color 0.3s ease; touch-action: manipulation;
        }

        /* SCREENS */
        .screen { display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 15px 20px; flex: 1; flex-direction: column; height: 100dvh; }
        .screen.active { display: flex; }

        /* START SCREEN */
        .hero { text-align: center; margin: 10px 0 25px; }
        .hero h1 { color: var(--primary); font-size: 2.2rem; font-weight: 800; margin-bottom: 5px; }
        .name-input-wrapper { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .name-input { padding: 10px 15px; border-radius: 8px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-main); font-size: 1rem; text-align: center; outline: none; transition: var(--transition); }
        .name-input:focus { border-color: var(--primary); }
        
        .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; overflow-y: auto; padding-bottom: 20px; }
        .level-card { background: var(--bg-card); border-radius: var(--radius); padding: 20px; text-align: center; box-shadow: var(--shadow); border: 2px solid var(--border); cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; justify-content: space-between;}
        .level-card:hover { transform: translateY(-3px); border-color: var(--primary); }
        .level-card h3 { font-size: 1.05rem; margin-bottom: 5px; color: var(--text-main); line-height: 1.3;}
        .level-card p { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; }
        .stars { display: flex; justify-content: center; gap: 3px; color: var(--border); font-size: 1.2rem; }
        .stars .earned { color: var(--warning); text-shadow: 0 0 5px rgba(253, 203, 110, 0.5); }

        /* HEADER & UTILS */
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: var(--transition); font-size: 0.9rem; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
        .btn-icon { padding: 8px; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .btn-danger { background: rgba(255, 118, 117, 0.15); color: var(--error); border: 1px solid var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .user-greeting { font-size: 1.1rem; font-weight: 700; color: var(--primary); cursor: pointer; }
        .header-controls { display: flex; gap: 8px; }

        /* MAIN CARD */
        .card { background: var(--bg-card); border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); text-align: center; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; margin-bottom: 15px; flex-shrink: 1; position: relative; overflow: hidden; }
        
        /* TIMER BAR */
        .timer-track { position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: var(--border); display: none; }
        .timer-fill { height: 100%; background: var(--warning); width: 100%; transition: width 0.1s linear; }
        .timer-track.active { display: block; }
        .timer-track.danger .timer-fill { background: var(--error); }

        .progress-container { margin-bottom: 15px; }
        .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .level-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 10px;}
        .phase-badge { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; padding: 4px 10px; border-radius: 8px; display: flex; align-items: center; gap: 4px;}
        .phase-badge.easy { color: var(--success); background: rgba(0, 184, 148, 0.1); }
        .phase-badge.mod { color: var(--warning); background: rgba(253, 203, 110, 0.15); }
        .phase-badge.hard { color: var(--error); background: rgba(255, 118, 117, 0.15); }
        .phase-badge.practice { color: var(--primary); background: rgba(108, 92, 231, 0.1); }
        
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        
        /* QUESTION AREA */
        .question-area { margin: 20px 0; }
        .question-text { font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 800; color: var(--text-main); line-height: 1.2; margin-bottom: 5px; word-break: keep-all; transition: opacity 0.2s; }
        .sub-text { color: var(--text-muted); font-size: 0.95rem; min-height: 1.2em; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .sub-text.big-error { font-size: clamp(1.1rem, 3vw, 1.3rem); font-weight: 800; color: var(--error); }

        /* INPUT AREA */
        .input-wrapper { position: relative; width: 100%; max-width: 300px; margin: 0 auto; }
        #answerInput { width: 100%; background: var(--bg-input); border: 2px solid transparent; color: var(--text-main); font-size: 1.8rem; font-weight: 700; text-align: center; padding: 12px; border-radius: 12px; outline: none; font-family: 'Courier New', Courier, monospace; }
        #answerInput.error { border-color: var(--error); animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; color: var(--error); }
        #answerInput.success { border-color: var(--success); color: var(--success); }

        /* NEXT BTN OVERLAY */
        #nextBtnContainer { display: none; margin-top: 15px; }
        #nextBtnContainer.active { display: block; animation: fadeIn 0.3s ease; }
        .btn-next-huge { width: 100%; background: var(--error); color: white; font-size: 1.2rem; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 118, 117, 0.3); transition: var(--transition); }
        .btn-next-huge:hover { background: #ff4757; transform: translateY(-2px); }

        /* KEYPAD */
        #keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: auto; width: 100%; padding-bottom: 10px; }
        #keypad.disabled { opacity: 0.5; pointer-events: none; display: none; }
        .key-btn { background-color: var(--bg-card); color: var(--text-main); font-size: 1.3rem; font-weight: 700; border: 1px solid var(--border); border-radius: 12px; padding: 14px 0; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); user-select: none; display: flex; align-items: center; justify-content: center; font-family: inherit; }
        .key-btn:active, .key-btn.active-visual { transform: scale(0.95); background-color: var(--bg-input); }
        .key-action { background-color: var(--error); color: white; border-color: var(--error); font-size: 1.1rem; }
        .key-enter { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); }

        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal { background: var(--bg-card); padding: 30px; border-radius: var(--radius); max-width: 400px; width: 90%; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .modal h2 { margin-bottom: 15px; color: var(--text-main); font-weight: 800; }
        .modal p { color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .modal code { background: var(--bg-input); padding: 2px 6px; border-radius: 4px; color: var(--primary); font-family: monospace; font-weight: bold; }

        .slider-container { margin: 20px 0; display: flex; align-items: center; gap: 15px; }
        input[type="range"] { flex: 1; accent-color: var(--primary); }

        @media (max-height: 650px) {
            .card { padding: 15px; margin-bottom: 10px; }
            #answerInput { font-size: 1.5rem; padding: 8px; }
            .key-btn { padding: 10px 0; font-size: 1.1rem; }
            .question-text { font-size: clamp(1.6rem, 5vw, 2.2rem); }
        }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
    <div class="header-controls" style="justify-content: flex-end; margin-bottom: 10px;">
        <button class="btn btn-danger btn-icon" id="resetDataBtn" title="Reset All Progress">🗑️</button>
        <button class="btn btn-ghost btn-icon" id="themeToggleStart" title="Toggle Theme">🌙</button>
    </div>
    <div class="hero">
        <h1>Factoring Mastery 🧮</h1>
        <p style="color: var(--text-muted);">Master Algebra step-by-step 🚀</p>
    </div>
    <div class="name-input-wrapper">
        <input type="text" id="userNameInput" class="name-input" placeholder="Enter your name ✍️">
        <button class="btn" id="saveNameBtn">Let's Go ➔</button>
    </div>
    <div class="level-grid" id="levelGrid">
        <!-- Generated by JS -->
    </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">
    <header>
        <div class="user-greeting" id="headerName" title="Change Name">Hello, Player! 👋</div>
        <div class="header-controls">
            <button class="btn btn-ghost btn-icon" id="homeBtn" title="Back to Menu">🏠</button>
            <button class="btn btn-ghost btn-icon" id="helpBtn" title="Teacher's Note">🎓</button>
            <button class="btn btn-ghost btn-icon" id="timerConfigBtn" title="Configure Timer">⏱️</button>
            <button class="btn btn-ghost btn-icon" id="themeToggleGame" title="Toggle Theme">🌙</button>
        </div>
    </header>

    <main class="card">
        <div class="timer-track" id="timerTrack"><div class="timer-fill" id="timerFill"></div></div>
        
        <div class="progress-container">
            <div class="progress-header">
                <div class="level-title" id="levelLabel">Level 1</div>
                <span class="phase-badge easy" id="phaseBadge">🌱 Easy</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
        </div>

        <div class="question-area">
            <div class="sub-text" id="feedbackMsg">&nbsp;</div>
            <div class="question-text" id="questionDisplay">Loading...</div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="answerInput" placeholder="Factored Form" readonly>
        </div>

        <!-- Next Question Overlay (replaces keypad on error) -->
        <div id="nextBtnContainer">
            <button class="btn-next-huge" id="nextQuestionBtn">Got it! Next Question ⏭️</button>
        </div>
    </main>

    <div id="keypad">
        <button class="key-btn" data-val="1">1</button>
        <button class="key-btn" data-val="2">2</button>
        <button class="key-btn" data-val="3">3</button>
        <button class="key-btn" data-val="+">+</button>

        <button class="key-btn" data-val="4">4</button>
        <button class="key-btn" data-val="5">5</button>
        <button class="key-btn" data-val="6">6</button>
        <button class="key-btn" data-val="-">-</button>

        <button class="key-btn" data-val="7">7</button>
        <button class="key-btn" data-val="8">8</button>
        <button class="key-btn" data-val="9">9</button>
        <button class="key-btn" data-val="(">(</button>

        <button class="key-btn" data-val="x">x</button>
        <button class="key-btn" data-val="0">0</button>
        <button class="key-btn" data-val="^2">²</button>
        <button class="key-btn" data-val=")">)</button>
        
        <button class="key-btn key-action" id="keyDel" style="grid-column: span 2;">DEL</button>
        <button class="key-btn key-enter" id="keyEnter" style="grid-column: span 2;">ENTER ➔</button>
    </div>
</div>

<!-- Timer Config Modal -->
<div class="modal-overlay" id="timerModal">
    <div class="modal">
        <h2>Timer Settings ⏱️</h2>
        <p>Challenge yourself by setting a time limit per question.</p>
        <label style="display: flex; align-items: center; gap: 10px; font-weight: bold; color: var(--text-main); cursor: pointer;">
            <input type="checkbox" id="timerEnableCb" style="width: 18px; height: 18px;"> Enable Timer
        </label>
        <div class="slider-container">
            <input type="range" id="timerSlider" min="15" max="60" value="30" step="5">
            <span id="timerValDisplay" style="font-weight: bold; color: var(--primary); width: 40px;">30s</span>
        </div>
        <div class="modal-actions">
            <button class="btn" id="saveTimerBtn">Save Settings ✔️</button>
        </div>
    </div>
</div>

<!-- Tutorial Modal -->
<div class="modal-overlay" id="tutorialModal">
    <div class="modal">
        <h2>Teacher's Note 🎓</h2>
        <p id="tutorialText" style="font-size: 0.95rem;"></p>
        <div class="modal-actions">
            <button class="btn" id="closeTutorialBtn">Got it! 👍</button>
        </div>
    </div>
</div>

<!-- Level Complete Modal -->
<div class="modal-overlay" id="levelCompleteModal">
    <div class="modal">
        <h2 id="congratsTitle">Level Mastered! 🎉</h2>
        <p id="congratsBody">You have successfully completed all phases.</p>
        <div class="modal-actions">
            <button class="btn btn-ghost" id="btnModalHome">Home 🏠</button>
            <button class="btn" id="btnModalAction">Next Phase ⏭️</button>
        </div>
    </div>
</div>

<script>
    /** APP STATE & CONFIG **/
    const LEVELS =[
        { id: 1, label: "Monomials 🔢", desc: "Common monomial factors" },
        { id: 2, label: "Diff of Squares 🔲", desc: "e.g., x² - 9" },
        { id: 3, label: "GCF + Diff Sqr 📦", desc: "e.g., 2x² - 18" },
        { id: 4, label: "Monic Quadratics 📈", desc: "x² + bx + c" },
        { id: 5, label: "GCF + Monic 🧩", desc: "e.g., 2x² + 10x + 12" },
        { id: 6, label: "Mixed Mastery 👑", desc: "All methods combined" }
    ];

    const TEACHER_NOTES = {
        1: "<strong>Common Monomial Factoring:</strong> Find the Greatest Common Factor (GCF) of all terms. Example: <code>3x² - 6x = 3x(x - 2)</code>.",
        2: "<strong>Difference of Two Squares:</strong> Use the pattern <code>a² - b² = (a - b)(a + b)</code>. Example: <code>x² - 25 = (x - 5)(x + 5)</code>.",
        3: "<strong>GCF + Difference of Squares:</strong> Factor out the GCF first, then factor the difference of squares. Example: <code>2x² - 18 = 2(x - 3)(x + 3)</code>.",
        4: "<strong>Monic Quadratics (x² + bx + c):</strong> Find two numbers that multiply to <code>c</code> and add to <code>b</code>. Pay attention to the signs!",
        5: "<strong>GCF + Monic Quadratics:</strong> Factor out the common monomial first, then factor the quadratic completely. Example: <code>2x² + 10x + 12 = 2(x + 2)(x + 3)</code>.",
        6: "<strong>Mixed All:</strong> The ultimate challenge! Identify the correct factoring method for each expression."
    };

    const STORAGE_KEY = 'factoring_mastery_v3';
    const QUESTIONS_PER_PHASE = 7;
    
    let state = {
        userName: "",
        theme: 'light',
        timerEnabled: false,
        timerDuration: 30, // seconds
        levelData: {}, // { levelId: { phaseCleared: 0 } }
        history:[] // anti-repeat
    };

    // Runtime variables
    let currentLevel = null;
    let currentPhase = 0; // 0=Easy, 1=Mod, 2=Hard, 3=Practice(Random)
    let questionsAnswered = 0;
    let currentQuestion = null;
    let inputVal = "";
    
    // Control variables for input locking
    let isErrorState = false; 
    let isProcessing = false; // Prevents "Enter" spamming while checking/animating
    let timerInterval = null;

    /** INITIALIZATION **/
    function init() {
        loadState();
        applyTheme();
        setupEventListeners();

        if (!state.userName) {
            document.getElementById('userNameInput').focus();
        } else {
            document.getElementById('userNameInput').value = state.userName;
        }
        
        renderLevelGrid();
    }

    function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try { state = { ...state, ...JSON.parse(saved) }; } catch (e) {}
        }
        if(!state.history) state.history =[];
        if(typeof state.timerEnabled === 'undefined') state.timerEnabled = false;
        if(!state.timerDuration) state.timerDuration = 30;
    }

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    /** UI ROUTING **/
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'startScreen') renderLevelGrid();
    }

    function renderLevelGrid() {
        const grid = document.getElementById('levelGrid');
        grid.innerHTML = '';
        
        LEVELS.forEach(lvl => {
            const card = document.createElement('div');
            card.className = 'level-card';
            
            let phaseCleared = state.levelData[lvl.id]?.phaseCleared || 0;
            let starsHtml = '';
            for(let i=1; i<=3; i++) {
                starsHtml += `<span class="${i <= phaseCleared ? 'earned' : ''}">★</span>`;
            }

            card.innerHTML = `
                <div>
                    <h3>Level ${lvl.id}:<br>${lvl.label}</h3>
                    <p>${lvl.desc}</p>
                </div>
                <div class="stars">${starsHtml}</div>
            `;
            card.onclick = () => startLevel(lvl.id);
            grid.appendChild(card);
        });

        document.getElementById('headerName').textContent = state.userName ? `Hello, ${state.userName}! 👋` : "Hello, Player! 👋";
    }

    /** MATH ENGINE **/
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randNonZero(min, max) { let v = 0; while (v === 0) v = randInt(min, max); return v; }
    function gcd(x, y) { x = Math.abs(x); y = Math.abs(y); while(y) { let t = y; y = x % y; x = t; } return x; }

    function getBounds(phase) {
        if(phase === 0) return { rMin: 1, rMax: 4, kMax: 3 }; // Easy
        if(phase === 1) return { rMin: 3, rMax: 8, kMax: 5 }; // Moderate
        if(phase === 2) return { rMin: 6, rMax: 15, kMax: 9 }; // Hard
        return { rMin: 1, rMax: 12, kMax: 7 }; // Practice
    }

    // Generate Raw Data
    function generateLevelData(levelId, phase) {
        let b = getBounds(phase);
        let k = 1, x_power = 0, binoms =[];
        
        switch(levelId) {
            case 1: // Monomials
                if (Math.random() < 0.5) {
                    k = randInt(2, b.kMax); if (Math.random() < 0.3) k = -k;
                    x_power = 1; binoms =[{deg: 1, a: 1, b: randNonZero(-b.rMax, b.rMax)}];
                } else {
                    k = randInt(2, b.kMax); if (Math.random() < 0.3) k = -k;
                    x_power = 0; binoms =[{deg: 2, a: 1, b: randInt(1, b.rMax)}]; 
                }
                break;
            case 2: // Diff of Squares
                let a2 = 1, b2 = 1;
                if (phase === 0) {
                    // Strictly x^2 - a^2 where a is 1 to 10
                    b2 = randInt(1, 10);
                } else {
                    a2 = (Math.random() < 0.5) ? randInt(2, 4) : 1;
                    b2 = randInt(b.rMin, b.rMax);
                    while (gcd(a2, b2) !== 1) { a2 = randInt(1, 4); b2 = randInt(b.rMin, b.rMax); }
                }
                binoms =[{deg: 1, a: a2, b: -b2}, {deg: 1, a: a2, b: b2}];
                break;
            case 3: // GCF + Diff Sq
                k = randInt(2, b.kMax);
                let a3 = (phase > 1) ? randInt(2, 3) : 1; 
                let b3 = randInt(b.rMin, b.rMax);
                while (gcd(a3, b3) !== 1) { a3 = randInt(1, 3); b3 = randInt(b.rMin, b.rMax); }
                binoms =[{deg: 1, a: a3, b: -b3}, {deg: 1, a: a3, b: b3}];
                break;
            case 4: // Monic Quadratics (Fully randomized sequence immediately)
                let r1 = randInt(b.rMin, b.rMax);
                let r2 = randInt(b.rMin, b.rMax);
                let s1 = Math.random() < 0.5 ? 1 : -1;
                let s2 = Math.random() < 0.5 ? 1 : -1;
                // If opposite signs, prevent r1==r2 (which would make it diff of squares instead of trinomial)
                if (s1 !== s2) { while(r1 === r2) r2 = randInt(b.rMin, b.rMax); }
                binoms =[{deg: 1, a: 1, b: r1*s1}, {deg: 1, a: 1, b: r2*s2}];
                break;
            case 5: // GCF + Monic
                let monicData = generateLevelData(4, phase);
                return { k: randInt(2, b.kMax), x_power: 0, binoms: monicData.binoms };
            case 6: // Mixed All
                return generateLevelData(randInt(1, 5), phase);
        }
        return { k, x_power, binoms };
    }

    function expand(k, x_power, binoms) {
        let poly = [1];
        for (let b of binoms) {
            let deg = b.deg || 1;
            let newPoly = new Array(poly.length + deg).fill(0);
            for (let i = 0; i < poly.length; i++) {
                newPoly[i] += poly[i] * b.b; 
                newPoly[i + deg] += poly[i] * b.a; 
            }
            poly = newPoly;
        }
        let finalPoly = new Array(poly.length + x_power).fill(0);
        for (let i = 0; i < poly.length; i++) {
            finalPoly[i + x_power] = poly[i] * k;
        }
        return finalPoly;
    }

    function formatPoly(poly) {
        let str = "";
        for (let i = poly.length - 1; i >= 0; i--) {
            let c = poly[i];
            if (c === 0) continue;
            let term = "";
            let absC = Math.abs(c);
            if (i === 0) term = absC.toString();
            else if (i === 1) term = (absC === 1 ? "" : absC) + "x";
            else term = (absC === 1 ? "" : absC) + "x^2";
            
            if (str === "") str += (c < 0 ? "-" : "") + term;
            else str += (c < 0 ? " - " : " + ") + term;
        }
        return str;
    }

    function formatBinomial(bObj) {
        let a = bObj.a, b = bObj.b, deg = bObj.deg || 1;
        let xStr = deg === 2 ? "x^2" : "x";
        let ax = "";
        if (a === 1) ax = xStr; else if (a === -1) ax = "-" + xStr; else if (a !== 0) ax = a + xStr;
        let bStr = b > 0 ? "+" + b : b.toString();
        
        let res =[];
        if (a !== 0 && b !== 0) { res.push(`(${ax}${bStr})`); let axWithSign = a > 0 ? "+" + ax : ax; res.push(`(${b}${axWithSign})`); } 
        else if (a !== 0 && b === 0) res.push(`(${ax})`); 
        else if (a === 0 && b !== 0) res.push(`(${b})`);
        return res;
    }

    function generateAcceptableAnswers(k, x_power, binoms) {
        let prefix = "";
        if (k === 1) { if (x_power === 1) prefix = "x"; else if (x_power === 2) prefix = "x^2"; } 
        else if (k === -1) { if (x_power === 1) prefix = "-x"; else if (x_power === 2) prefix = "-x^2"; else if (x_power === 0) prefix = "-"; } 
        else if (k !== 0) { if (x_power === 1) prefix = k + "x"; else if (x_power === 2) prefix = k + "x^2"; else if (x_power === 0) prefix = k.toString(); }
        
        let prefixes =[prefix];
        if (k === -1 && x_power === 0) prefixes.push("-1");
        if (k === 1 && x_power === 0 && binoms.length === 0) prefixes = ["1"]; 
        if (k === 1 && x_power === 0 && binoms.length > 0) prefixes =[""];
        if (k === 1 && x_power === 1) prefixes.push("1x"); 
        
        let binomStrs = binoms.map(b => formatBinomial(b));
        
        function permute(arr) {
            if (arr.length === 0) return[[]];
            let result =[];
            for (let i = 0; i < arr.length; i++) {
                let rest = arr.slice(0, i).concat(arr.slice(i + 1));
                let restPerms = permute(rest);
                for (let p of restPerms) result.push([arr[i]].concat(p));
            }
            return result;
        }
        
        let perms = permute(binomStrs); 
        let answers = new Set();
        
        function cartesian(arrays) {
            if (arrays.length === 0) return [[]];
            let result =[];
            let rest = cartesian(arrays.slice(1));
            for (let val of arrays[0]) { for (let r of rest) result.push([val].concat(r)); }
            return result;
        }

        for (let p of perms) {
            let combos = cartesian(p);
            for (let c of combos) {
                let binomJoined = c.join("");
                for (let pref of prefixes) answers.add(pref + binomJoined);
            }
        }
        
        if (binoms.length === 2 && binoms[0].a === binoms[1].a && binoms[0].b === binoms[1].b && binoms[0].deg === binoms[1].deg) {
            let bStrs = formatBinomial(binoms[0]);
            for (let bs of bStrs) { for (let pref of prefixes) answers.add(pref + bs + "^2"); }
        }
        if (binoms.length === 0) { for (let pref of prefixes) answers.add(pref); }
        
        return Array.from(answers);
    }

    function prettyPrintMath(str) { return str.replace(/\^2/g, '²'); }
    function normalizeInput(str) {
        str = str.replace(/²/g, '^2').replace(/\s+/g, '').replace(/\*/g, '');
        str = str.replace(/(^|[^0-9])1x/g, '$1x').replace(/\+-/g, '-').replace(/\^1\b/g, '');
        return str.toLowerCase();
    }

    /** GAMEPLAY LOGIC **/
    function startLevel(id) {
        currentLevel = id;
        if(!state.levelData[id]) state.levelData[id] = { phaseCleared: 0 };
        currentPhase = state.levelData[id].phaseCleared;
        if(currentPhase > 3) currentPhase = 3; 
        
        questionsAnswered = 0;
        showScreen('gameScreen');
        updatePhaseUI();
        
        if (currentPhase === 0) showTutorial(id);
        nextQuestion();
    }

    function generateUniqueQuestion() {
        let attempts = 0;
        let qData, poly, displayStr, validAnswers;
        
        while (attempts < 20) {
            qData = generateLevelData(currentLevel, currentPhase);
            poly = expand(qData.k, qData.x_power, qData.binoms);
            displayStr = formatPoly(poly);
            
            if (!state.history.includes(displayStr)) break;
            attempts++;
        }

        state.history.push(displayStr);
        if (state.history.length > 50) state.history.shift();

        validAnswers = generateAcceptableAnswers(qData.k, qData.x_power, qData.binoms);
        return { display: displayStr, answers: validAnswers };
    }

    function nextQuestion() {
        stopTimer();
        isErrorState = false;
        
        document.getElementById('keypad').style.display = 'grid';
        document.getElementById('nextBtnContainer').classList.remove('active');
        
        inputVal = "";
        updateInputDisplay();
        
        const inputEl = document.getElementById('answerInput');
        inputEl.classList.remove('success', 'error');
        document.getElementById('feedbackMsg').innerHTML = '&nbsp;';

        if (questionsAnswered >= QUESTIONS_PER_PHASE) {
            handlePhaseComplete();
            return;
        }

        currentQuestion = generateUniqueQuestion();
        
        const el = document.getElementById('questionDisplay');
        el.style.opacity = 0;
        setTimeout(() => {
            el.textContent = prettyPrintMath(currentQuestion.display);
            el.style.opacity = 1;
            startTimer();
        }, 100);

        renderProgressBar();
    }

    function handlePhaseComplete() {
        const modal = document.getElementById('levelCompleteModal');
        const title = document.getElementById('congratsTitle');
        const body = document.getElementById('congratsBody');
        const btnAction = document.getElementById('btnModalAction');
        
        let nameStr = state.userName ? `, ${state.userName}` : '';
        const lvlObj = LEVELS.find(l => l.id === currentLevel);

        if (currentPhase < 2) {
            // Finished Easy or Mod
            state.levelData[currentLevel].phaseCleared = currentPhase + 1;
            saveState();
            
            title.textContent = `Phase Complete! 🌟`;
            body.textContent = `Great job${nameStr}! You've finished the ${currentPhase === 0 ? 'Easy 🌱' : 'Moderate 🌿'} phase. Ready for a tougher challenge?`;
            
            btnAction.textContent = "Next Phase ⏭️";
            btnAction.onclick = () => { modal.classList.remove('open'); startLevel(currentLevel); };
        } else if (currentPhase === 2) {
            // Finished Hard -> Mastered
            state.levelData[currentLevel].phaseCleared = 3;
            saveState();
            
            title.textContent = `Level Mastered! 🎉`;
            body.textContent = `Amazing work${nameStr}! You've mastered ${lvlObj.label.split(' ')[0]}.`;
            
            let allMastered = LEVELS.every(l => state.levelData[l.id] && state.levelData[l.id].phaseCleared >= 3);
            if (allMastered) {
                title.textContent = `Game Completed! 🏆`;
                body.textContent = `Incredible${nameStr}! You have mastered ALL factoring techniques! 👑`;
            }

            if (currentLevel < LEVELS.length) {
                btnAction.textContent = "Next Level ➡️";
                btnAction.onclick = () => { modal.classList.remove('open'); startLevel(currentLevel + 1); };
            } else {
                btnAction.textContent = "Practice 🔄";
                btnAction.onclick = () => { modal.classList.remove('open'); startLevel(currentLevel); };
            }
        } else {
            // Finished Practice
            title.textContent = `Practice Complete! 🧠`;
            body.textContent = `Good job keeping your skills sharp${nameStr}!`;
            btnAction.textContent = "Play Again 🔄";
            btnAction.onclick = () => { modal.classList.remove('open'); startLevel(currentLevel); };
        }
        
        modal.classList.add('open');
    }

    function checkAnswer(isTimeout = false) {
        if (isProcessing) return; // Prevent spam clicking/pressing Enter

        if (isErrorState) {
            nextQuestion();
            return;
        }

        let userStr = document.getElementById('answerInput').value;
        if (!userStr && !isTimeout) return;

        isProcessing = true; // Lock all inputs
        stopTimer();
        
        let normalizedUser = normalizeInput(userStr);
        let validAnswersNormalized = currentQuestion.answers.map(normalizeInput);
        let isCorrect = !isTimeout && validAnswersNormalized.includes(normalizedUser);

        const inputEl = document.getElementById('answerInput');

        if (isCorrect) {
            inputEl.classList.add('success');
            const feedback = document.getElementById('feedbackMsg');
            feedback.className = 'sub-text'; feedback.textContent = "Correct! ✨"; feedback.style.color = "var(--success)";
            questionsAnswered++;
            
            // Keep locked while celebrating for 700ms
            setTimeout(() => { 
                isProcessing = false; // Unlock
                nextQuestion(); 
            }, 700);
        } else {
            inputEl.classList.add('error');
            const feedback = document.getElementById('feedbackMsg');
            feedback.className = 'sub-text big-error';
            
            let expected = prettyPrintMath(currentQuestion.answers[0]);
            feedback.innerHTML = isTimeout ? `Time's Up! ⏰ Expected: <code>${expected}</code>` : `Incorrect ❌ Expected: <code>${expected}</code>`;
            
            isErrorState = true;
            isProcessing = false; // Unlock so user can proceed to next question
            
            document.getElementById('keypad').style.display = 'none';
            document.getElementById('nextBtnContainer').classList.add('active');
        }
    }

    /** TIMER MECHANICS **/
    function startTimer() {
        if (!state.timerEnabled) {
            document.getElementById('timerTrack').classList.remove('active');
            return;
        }
        
        document.getElementById('timerTrack').classList.add('active');
        document.getElementById('timerTrack').classList.remove('danger');
        
        let durationMs = state.timerDuration * 1000;
        let startTime = Date.now();
        const fill = document.getElementById('timerFill');
        fill.style.width = '100%';

        timerInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let remaining = durationMs - elapsed;
            
            if (remaining <= 0) {
                stopTimer();
                fill.style.width = '0%';
                checkAnswer(true); 
            } else {
                let pct = (remaining / durationMs) * 100;
                fill.style.width = `${pct}%`;
                if (pct < 25) document.getElementById('timerTrack').classList.add('danger');
            }
        }, 50);
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
    }

    /** INPUT HANDLING **/
    function handleKeypadInput(val) {
        if (isErrorState || isProcessing) return;
        if (inputVal.length < 30) {
            inputVal += val;
            updateInputDisplay();
        }
    }

    function deleteInput() {
        if (isErrorState || isProcessing) return;
        if(inputVal.length > 0) {
            if (inputVal.endsWith('^2')) inputVal = inputVal.slice(0, -2);
            else inputVal = inputVal.slice(0, -1);
            updateInputDisplay();
        }
    }

    function updateInputDisplay() {
        document.getElementById('answerInput').value = prettyPrintMath(inputVal);
    }

    /** UI RENDERING **/
    function updatePhaseUI() {
        const lvl = LEVELS.find(l => l.id === currentLevel);
        document.getElementById('levelLabel').textContent = `Lvl ${lvl.id}: ${lvl.label.split(' ')[0]}`;

        const badge = document.getElementById('phaseBadge');
        if (currentPhase === 0) { badge.innerHTML = "🌱 Easy"; badge.className = "phase-badge easy"; }
        else if (currentPhase === 1) { badge.innerHTML = "🌿 Moderate"; badge.className = "phase-badge mod"; }
        else if (currentPhase === 2) { badge.innerHTML = "🔥 Hard"; badge.className = "phase-badge hard"; }
        else { badge.innerHTML = "🧠 Practice"; badge.className = "phase-badge practice"; }
    }

    function renderProgressBar() {
        let pct = (questionsAnswered / QUESTIONS_PER_PHASE) * 100;
        document.getElementById('progressBar').style.width = `${pct}%`;
    }

    function showTutorial(levelId) {
        document.getElementById('tutorialText').innerHTML = TEACHER_NOTES[levelId] || "Factor the expression completely.";
        document.getElementById('tutorialModal').classList.add('open');
    }

    function applyTheme() {
        document.body.setAttribute('data-theme', state.theme);
    }

    /** EVENT LISTENERS **/
    function setupEventListeners() {
        // Name Input
        document.getElementById('saveNameBtn').addEventListener('click', () => {
            state.userName = document.getElementById('userNameInput').value.trim();
            saveState();
            renderLevelGrid();
        });
        document.getElementById('headerName').addEventListener('click', () => {
            showScreen('startScreen');
            document.getElementById('userNameInput').focus();
        });

        // Reset Data
        document.getElementById('resetDataBtn').addEventListener('click', () => {
            if (confirm("Are you sure you want to reset all your progress? 🗑️")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        });

        // Keypad
        document.querySelectorAll(".key-btn[data-val]").forEach(btn => {
            btn.addEventListener("click", () => handleKeypadInput(btn.getAttribute("data-val")));
        });
        document.getElementById("keyDel").addEventListener("click", deleteInput);
        document.getElementById("keyEnter").addEventListener("click", () => checkAnswer(false));
        
        document.getElementById("nextQuestionBtn").addEventListener("click", () => {
            if (isErrorState) nextQuestion();
        });

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' && e.target.id !== 'answerInput') return;
            if (isProcessing) return; // Ignore all keys while locking is active
            
            if (document.getElementById('levelCompleteModal').classList.contains('open')) {
                if(e.key === 'Enter') { e.preventDefault(); document.getElementById('btnModalAction').click(); }
                return;
            }

            let validKeys =['1','2','3','4','5','6','7','8','9','0','x','+','-','(',')','^'];
            let k = e.key.toLowerCase();
            
            if (isErrorState) {
                if (e.key === 'Enter') { e.preventDefault(); nextQuestion(); }
                return;
            }

            if (validKeys.includes(k)) {
                handleKeypadInput(k); triggerKeyVisual(k);
            } else if (e.key === 'Backspace') {
                deleteInput(); triggerKeyVisual('Backspace');
            } else if (e.key === 'Enter') {
                checkAnswer(false); triggerKeyVisual('Enter');
            }
        });

        // Theme
        const toggleTheme = () => { state.theme = state.theme === 'light' ? 'dark' : 'light'; saveState(); applyTheme(); };
        document.getElementById('themeToggleStart').addEventListener('click', toggleTheme);
        document.getElementById('themeToggleGame').addEventListener('click', toggleTheme);

        // Top Buttons
        document.getElementById('homeBtn').addEventListener('click', () => { stopTimer(); showScreen('startScreen'); });
        document.getElementById('helpBtn').addEventListener('click', () => showTutorial(currentLevel));
        
        // Timer Config
        document.getElementById('timerConfigBtn').addEventListener('click', () => {
            document.getElementById('timerEnableCb').checked = state.timerEnabled;
            document.getElementById('timerSlider').value = state.timerDuration;
            document.getElementById('timerValDisplay').textContent = state.timerDuration + 's';
            document.getElementById('timerSlider').disabled = !state.timerEnabled;
            document.getElementById('timerModal').classList.add('open');
        });
        
        document.getElementById('timerEnableCb').addEventListener('change', (e) => {
            document.getElementById('timerSlider').disabled = !e.target.checked;
        });

        document.getElementById('timerSlider').addEventListener('input', (e) => {
            document.getElementById('timerValDisplay').textContent = e.target.value + 's';
        });

        document.getElementById('saveTimerBtn').addEventListener('click', () => {
            state.timerEnabled = document.getElementById('timerEnableCb').checked;
            state.timerDuration = parseInt(document.getElementById('timerSlider').value);
            saveState();
            document.getElementById('timerModal').classList.remove('open');
            stopTimer();
            if (currentQuestion && !isErrorState) startTimer(); 
        });

        // Modals
        document.getElementById('closeTutorialBtn').addEventListener('click', () => {
            document.getElementById('tutorialModal').classList.remove('open');
        });
        
        document.getElementById('btnModalHome').addEventListener('click', () => {
            document.getElementById('levelCompleteModal').classList.remove('open');
            showScreen('startScreen');
        });
    }

    function triggerKeyVisual(val) {
        let btn;
        if (val === 'Backspace') btn = document.getElementById('keyDel');
        else if (val === 'Enter') btn = document.getElementById('keyEnter');
        else if (val === '^') btn = document.querySelector(`.key-btn[data-val="^2"]`);
        else btn = document.querySelector(`.key-btn[data-val="${val}"]`);
        
        if(btn) { btn.classList.add('active-visual'); setTimeout(() => btn.classList.remove('active-visual'), 100); }
    }

    init();
</script>
</body>
</html>
